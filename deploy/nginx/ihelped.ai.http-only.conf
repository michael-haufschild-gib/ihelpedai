# ihelped.ai — HTTP-only bootstrap nginx config.
# Used before certbot has provisioned certs. deploy/tls-setup.sh runs
# `certbot --nginx` against these server blocks; certbot rewrites this file
# in place to add SSL. After TLS is live, you may swap in the full config at
# deploy/nginx/ihelped.ai.conf if you want explicit, hand-curated HTTPS rules.

server {
    listen 80;
    listen [::]:80;
    server_name ihelped.ai www.ihelped.ai;

    root /var/www/ihelped.ai/dist;
    index index.html;

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # API reverse proxy.
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.ihelped.ai;

    # Admin host must never be reachable over plain HTTP — any login or session
    # cookie would travel in cleartext. Keep it dark until tls-setup.sh has
    # provisioned certs and replaced this file with ihelped.ai.conf.
    location / {
        return 503;
    }
}
