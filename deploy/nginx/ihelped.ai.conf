# ihelped.ai — nginx site config for calmerapy.
# Assumes certbot has already provisioned certificates for the listed domains.
#
# Access restriction: the site is in closed-beta / invite-only. Only IPs in
# the explicit allowlist below may reach the SPA or the API. Let's Encrypt's
# HTTP-01 challenge path (/.well-known/acme-challenge/) is exempt so renewals
# keep working from Let's Encrypt's validation servers.

# Re-usable allowlist map: any IP in $restricted_allowed returns "1". Nginx
# `map` preserves the default when the key is unseen, so this is safe to
# include multiple times.
#
# The actual allowlist lives in /etc/nginx/snippets/ihelped-allowlist.conf (one
# `<ip>  1;` entry per line) so beta testers can be added/removed without a
# repo commit. It intentionally does not live in /etc/nginx/conf.d because
# nginx includes that directory at http{} scope.
# The include is optional — loopback always stays allowed.
map $remote_addr $restricted_allowed {
    default                   0;
    127.0.0.1                 1;
    ::1                       1;
    include                   /etc/nginx/snippets/ihelped-allowlist.conf;
}

# HTTP → HTTPS (plus ACME carveout and allowlist)
server {
    listen 80;
    listen [::]:80;
    server_name ihelped.ai www.ihelped.ai;

    # Must stay open so Let's Encrypt can renew via HTTP-01.
    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/html;
        try_files $uri =404;
    }

    location / {
        if ($restricted_allowed = 0) { return 403; }
        return 301 https://$host$request_uri;
    }
}

# Public site
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ihelped.ai www.ihelped.ai;

    ssl_certificate     /etc/letsencrypt/live/ihelped.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ihelped.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Closed-beta allowlist. Matches $restricted_allowed defined in the map
    # above. ACME challenges go through port 80, so no carveout needed here.
    if ($restricted_allowed = 0) { return 403; }

    # Security headers. `add_header` does not inherit across nested `location`
    # blocks, so any child location that calls `add_header` must re-state
    # these directives (see long-cache assets block below).
    #
    # Content-Security-Policy: the SPA renders user-submitted free-text. The
    # server-side sanitiser strips nearly everything dangerous, but CSP is the
    # second line of defence so a sanitiser regression cannot become an XSS.
    # `style-src-attr 'unsafe-inline'` is required because motion/react and
    # Tailwind 4 set inline `style` attributes for transforms; `style-src`
    # itself stays self-only so injected `<style>` blocks remain blocked.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /var/www/ihelped.ai/dist;
    index index.html;

    # SPA fallback — any unknown URL serves the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets. Security headers repeated because nested
    # `location` blocks do not inherit `add_header` from the parent.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        try_files $uri =404;
    }

    # API reverse proxy.
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
